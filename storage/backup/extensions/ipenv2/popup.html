<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iPEN Otimizador - SIGEP</title>
  <style>
    :root {
      --background: 240 10% 3.9%; /* Zinc 950 */
      --foreground: 0 0% 98%;
      --card: 240 10% 3.9%;
      --border: 240 3.7% 15.9%;
      --primary: 217.2 91.2% 59.8%; /* Blue 500 */
      --muted: 240 3.7% 15.9%;
      --muted-foreground: 240 5% 64.9%;
    }

    body {
      width: 280px;
      background-color: hsl(var(--background));
      color: hsl(var(--foreground));
      font-family: 'Inter', -apple-system, sans-serif;
      margin: 0;
      padding: 16px;
      -webkit-user-select: none;
      user-select: none;
    }

    .header { margin-bottom: 20px; }
    .header h1 { font-size: 16px; font-weight: 800; margin: 0; letter-spacing: -0.02em; }
    .header p { font-size: 11px; color: hsl(var(--muted-foreground)); margin: 4px 0 0 0; }

    .card {
      border: 1px solid hsl(var(--border));
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background-color 0.2s;
    }

    .card:hover { background-color: rgba(255,255,255,0.02); }

    .card-info { display: flex; flex-direction: column; gap: 2px; }
    .card-title { font-size: 13px; font-weight: 600; }
    .card-desc { font-size: 10px; color: hsl(var(--muted-foreground)); }

    /* Switch Style (Shadcn) */
    .switch {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 20px;
    }

    .switch input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: hsl(var(--muted));
      transition: .4s;
      border-radius: 20px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 16px; width: 16px;
      left: 2px; bottom: 2px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked + .slider { background-color: #2563eb; }
    input:checked + .slider:before { transform: translateX(16px); }

    .footer {
      margin-top: 20px;
      padding-top: 12px;
      border-top: 1px solid hsl(var(--border));
      font-size: 9px;
      color: hsl(var(--muted-foreground));
      display: flex;
      justify-content: space-between;
    }
    .badge { background: #18181b; padding: 2px 6px; border-radius: 4px; border: 1px solid #27272a; }
  </style>
</head>
<body>
  <div class="header">
    <h1>iPEN Otimizador</h1>
    <p>Gestão Operacional SIGEP</p>
  </div>

  <div class="card">
    <div class="card-info">
      <span class="card-title">Sidebar Shadcn</span>
      <span class="card-desc">Menu lateral Zinc 950</span>
    </div>
    <label class="switch">
      <input type="checkbox" id="sidebar-toggle" aria-label="Ativar/Desativar Sidebar Shadcn">
      <span class="slider"></span>
    </label>
  </div>

  <div class="card">
    <div class="card-info">
      <span class="card-title">Relatório 1-5</span>
      <span class="card-desc">Cards Clover modernos</span>
    </div>
    <label class="switch">
      <input type="checkbox" id="relatorio-toggle" aria-label="Ativar/Desativar Relatório 1-5">
      <span class="slider"></span>
    </label>
  </div>

  <div class="card">
    <div class="card-info">
      <span class="card-title">Correções iPEN</span>
      <span class="card-desc">Evita erro 403 e bugs</span>
    </div>
    <label class="switch">
      <input type="checkbox" id="correcoes-toggle" aria-label="Ativar/Desativar Correções iPEN">
      <span class="slider"></span>
    </label>
  </div>

  <div class="card">
    <div class="card-info">
      <span class="card-title">Coleta Dados</span>
      <span class="card-desc">Coleta relatório 2.1 completo</span>
    </div>
    <label class="switch">
      <input type="checkbox" id="coleta-toggle" aria-label="Ativar/Desativar Coleta de Dados">
      <span class="slider"></span>
    </label>
  </div>

  <div class="footer">
    <span>Versão 1.0.0</span>
    <span class="badge">Ativo</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
