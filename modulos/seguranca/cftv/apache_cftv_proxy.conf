# =============================================================================
# CFTV Reverse Proxy Configuration
# Adicionar ao httpd.conf ou criar arquivo em conf.d/
# =============================================================================

# Habilitar módulos necessários (descomentar se não estiverem ativos)
# LoadModule proxy_module modules/mod_proxy.so
# LoadModule proxy_http_module modules/mod_proxy_http.so
# LoadModule ssl_module modules/mod_ssl.so

# Proxy para o sistema CFTV
<IfModule proxy_module>
    
    # Configuração do Proxy para CFTV
    ProxyPass "/cftv/" "https://172.16.0.251/"
    ProxyPassReverse "/cftv/" "https://172.16.0.251/"
    
    # Headers para contornar X-Frame-Options do CFTV
    <Location "/cftv/">
        # Remover headers de segurança que bloqueiam iframe
        Header unset X-Frame-Options
        Header set X-Frame-Options "SAMEORIGIN"
        
        # Permitir embed no SIGEP
        Header unset Content-Security-Policy
        Header set Content-Security-Policy "frame-ancestors 'self' http://localhost http://127.0.0.1"
        
        # Configurações SSL para conexão com servidor CFTV
        SSLProxyEngine on
        SSLProxyVerify none
        SSLProxyCheckPeerCN off
        SSLProxyCheckPeerName off
        SSLProxyCheckPeerExpire off
    </Location>
    
    # Websocket support (se o CFTV usar)
    ProxyPass "/cftv/ws/" "wss://172.16.0.251/ws/"
    ProxyPassReverse "/cftv/ws/" "wss://172.16.0.251/ws/"
    
</IfModule>

# =============================================================================
# ALTERNATIVA: Usar mod_substitute para reescrever conteúdo
# =============================================================================
<IfModule substitute_module>
    <Location "/cftv/">
        # Substituir X-Frame-Options no corpo da resposta (se presente no HTML)
        AddOutputFilterByType SUBSTITUTE text/html
        Substitute "s/X-Frame-Options: sameorigin//i"
        Substitute "s/X-Frame-Options: SAMEORIGIN//i"
    </Location>
</IfModule>
